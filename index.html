<!doctype html>
<html lang="en">
	<head>
		<title>Game of Life</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main>
			<h1>Game of life</h1>
			<div id="theGame" class="theGameCSS"></div>
			<section class="setting">
				<form>
					<div class="Gamesetings">
						<p class="text-body">Vitesse <span id="speedlog">10</span></p>
						<input id="speed" type="range" min="1" max="100" value="10" />
					</div>
					<div class="Gamesetings">
						<p class="text-body">zoom <span id="zoomlog">1</span></p>
						<input id="zoom" type="range" min="1" max="10" value="1" />
					</div>
				</form>
				<button id="startbtn" class="normal-btn">
					<h2>START</h2>
				</button>
			</section>
		</main>
		<script src="app.js"></script>
	</body>
</html>
